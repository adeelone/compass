name: Eval

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"

jobs:
  eval:
    name: eval gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e "backend[dev]"
      - run: make eval

